name: Sync upstream PyMammotion

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/mikey0000/PyMammotion.git
          git fetch upstream

      - name: Check for new upstream commits
        id: check
        run: |
          COUNT=$(git rev-list HEAD..upstream/main --count)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "$COUNT new upstream commit(s)"

      - name: Check protected files
        if: steps.check.outputs.count != '0'
        id: guard
        run: |
          CHANGED=$(git diff HEAD...upstream/main --name-only)
          echo "Files changed upstream:"
          echo "$CHANGED"
          FLAGGED=""
          for f in pymammotion/transport/ble.py pymammotion/device/handle.py; do
            if echo "$CHANGED" | grep -qx "$f"; then
              FLAGGED="${FLAGGED}- \`${f}\`\n"
            fi
          done
          if [ -n "$FLAGGED" ]; then
            echo "safe=false" >> $GITHUB_OUTPUT
            {
              echo 'flagged<<EOF'
              printf "%b" "$FLAGGED"
              echo EOF
            } >> $GITHUB_OUTPUT
          else
            echo "safe=true" >> $GITHUB_OUTPUT
          fi

      - name: Open issue — protected files changed
        if: steps.check.outputs.count != '0' && steps.guard.outputs.safe == 'false'
        uses: actions/github-script@v7
        env:
          FLAGGED: ${{ steps.guard.outputs.flagged }}
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Manual review needed — upstream touches patched files',
              body: [
                'Upstream PyMammotion has new commits that touch files we have patched:',
                '',
                process.env.FLAGGED,
                '',
                'Merge manually and verify our patches still apply cleanly.'
              ].join('\n'),
              labels: ['upstream-sync']
            })

      - name: Merge upstream
        if: steps.check.outputs.count != '0' && steps.guard.outputs.safe == 'true'
        id: merge
        run: |
          if git merge --no-edit upstream/main; then
            echo "outcome=success" >> $GITHUB_OUTPUT
          else
            CONFLICTS=$(git diff --name-only --diff-filter=U | tr '\n' ' ')
            git merge --abort
            echo "outcome=conflict" >> $GITHUB_OUTPUT
            echo "conflicts=$CONFLICTS" >> $GITHUB_OUTPUT
          fi

      - name: Open issue — unexpected merge conflict
        if: steps.merge.outputs.outcome == 'conflict'
        uses: actions/github-script@v7
        env:
          CONFLICTS: ${{ steps.merge.outputs.conflicts }}
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Upstream merge conflict',
              body: `Automatic merge from upstream failed.\n\nConflicts in: \`${process.env.CONFLICTS}\`\n\nManual merge required.`,
              labels: ['upstream-sync']
            })

      - name: Tag and push
        if: steps.merge.outputs.outcome == 'success'
        id: tag
        run: |
          LATEST=$(git tag --sort=-v:refname | grep '^v[0-9]' | head -1)
          echo "Current latest tag: $LATEST"
          VERSION=${LATEST#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "New tag: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          git tag "$NEW_TAG"
          git push origin main --tags

      - name: Trigger Mammotion-HA sync
        if: steps.merge.outputs.outcome == 'success'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DISPATCH_PAT }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'craigusus',
              repo: 'Mammotion-HA',
              event_type: 'pymammotion-updated',
              client_payload: { tag: '${{ steps.tag.outputs.new_tag }}' }
            })
